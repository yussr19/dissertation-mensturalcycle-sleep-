<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>luna recorder — survey results</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500&family=Inter:wght@400;500;600&display=swap');

  :root{
    --night: #171733;
    --night-deep: #100f24;
    --gold: #d9b667;
    --gold-dim: #9c895c;
    --paper: #f3ede1;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(circle at 50% -10%, #23234a 0%, var(--night) 45%, var(--night-deep) 100%);
    font-family:'Inter',sans-serif;
    color:var(--paper);
    padding:36px 20px 60px;
  }

  .wrap{max-width:760px;margin:0 auto;}

  h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:26px;
    margin:0 0 4px;
  }
  .sub{
    font-size:12px;
    color:var(--gold-dim);
    letter-spacing:0.05em;
    text-transform:uppercase;
    margin-bottom:26px;
  }

  .stat-row{
    display:flex;
    gap:14px;
    margin-bottom:26px;
    flex-wrap:wrap;
  }
  .stat{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(217,182,103,0.18);
    padding:14px 18px;
    min-width:110px;
  }
  .stat .num{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);}
  .stat .lab{font-size:11px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px;}

  table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
    margin-bottom:30px;
  }
  th,td{
    text-align:left;
    padding:9px 10px;
    border-bottom:1px solid rgba(217,182,103,0.15);
  }
  th{
    color:var(--gold-dim);
    font-weight:600;
    text-transform:uppercase;
    font-size:11px;
    letter-spacing:0.04em;
  }

  .btn{
    font-family:'Inter',sans-serif;
    font-size:13px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    background:var(--gold);
    color:var(--night-deep);
    border:none;
    padding:10px 20px;
    font-weight:600;
    border-radius:1px;
    cursor:pointer;
    margin-bottom:14px;
  }
  .btn:hover{background:#e8c883;}

  textarea{
    width:100%;
    height:140px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(217,182,103,0.18);
    color:var(--paper);
    font-family:monospace;
    font-size:12px;
    padding:12px;
    resize:vertical;
    display:none;
  }

  .empty{
    color:var(--gold-dim);
    font-size:14px;
    padding:20px 0;
  }

  .loading{color:var(--gold-dim);font-size:13px;}
</style>
</head>
<body>

<div class="wrap">
  <h1>survey results</h1>
  <div class="sub">luna recorder — visitor responses</div>

  <div id="content"><div class="loading">Loading responses…</div></div>
</div>

<script>
async function loadResults(){
  const content = document.getElementById('content');
  let keysResult;
  try{
    keysResult = await window.storage.list('response:', true);
  }catch(e){
    content.innerHTML = '<div class="empty">Could not load results. Try refreshing.</div>';
    return;
  }

  const keys = keysResult && keysResult.keys ? keysResult.keys : [];
  if(keys.length === 0){
    content.innerHTML = '<div class="empty">No responses yet.</div>';
    return;
  }

  const entries = [];
  for(const k of keys){
    try{
      const r = await window.storage.get(k, true);
      if(r && r.value){
        entries.push(JSON.parse(r.value));
      }
    }catch(e){ /* skip unreadable entry */ }
  }

  entries.sort((a,b)=> new Date(a.submittedAt) - new Date(b.submittedAt));

  const total = entries.length;
  const helped = entries.filter(e => e.understanding === 'Yes, clearly' || e.understanding === 'Somewhat').length;

  let html = `
    <div class="stat-row">
      <div class="stat"><div class="num">${total}</div><div class="lab">Responses</div></div>
      <div class="stat"><div class="num">${total ? Math.round(helped/total*100) : 0}%</div><div class="lab">Felt it helped</div></div>
    </div>

    <button class="btn" id="csvBtn">Show CSV to copy</button>
    <textarea id="csvBox" readonly></textarea>

    <table>
      <thead>
        <tr><th>#</th><th>Submitted</th><th>Gender</th><th>Age range</th><th>Understanding</th></tr>
      </thead>
      <tbody>
        ${entries.map((e,i)=>`
          <tr>
            <td>${i+1}</td>
            <td>${new Date(e.submittedAt).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</td>
            <td>${e.gender||''}</td>
            <td>${e.ageRange||''}</td>
            <td>${e.understanding||''}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;

  content.innerHTML = html;

  const csvHeader = 'submittedAt,gender,ageRange,understanding';
  const csvRows = entries.map(e => [e.submittedAt,e.gender,e.ageRange,e.understanding].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));
  const csv = [csvHeader, ...csvRows].join('\n');

  document.getElementById('csvBtn').addEventListener('click', ()=>{
    const box = document.getElementById('csvBox');
    box.value = csv;
    box.style.display = 'block';
    box.focus();
    box.select();
  });
}

loadResults();
</script>

</body>
</html>
